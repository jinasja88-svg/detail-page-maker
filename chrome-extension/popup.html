<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    .header {
      background: #2c3e50;
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; color: #bdc3c7; margin-top: 4px; }

    .content { padding: 16px; }

    .platform-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .platform-coupang { background: #e74c3c; color: white; }
    .platform-naver { background: #2db400; color: white; }
    .platform-cafe24 { background: #3498db; color: white; }
    .platform-unknown { background: #95a5a6; color: white; }

    .status {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e9ecef;
      font-size: 13px;
      line-height: 1.6;
    }
    .status .count { font-weight: 700; color: #2c3e50; font-size: 18px; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2c3e50; color: white; }
    .btn-download { background: #27ae60; color: white; margin-top: 8px; }

    .progress {
      margin-top: 12px;
      font-size: 12px;
      color: #7f8c8d;
      text-align: center;
    }

    .image-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 12px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }
    .image-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid #f1f3f5;
      font-size: 11px;
    }
    .image-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      margin-right: 8px;
    }
    .image-item .info { flex: 1; }
    .image-item .size { color: #95a5a6; }

    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>상세페이지 이미지 추출기</h1>
    <p>쿠팡 / 네이버 / 카페24</p>
  </div>

  <div class="content">
    <div id="platformArea"></div>

    <div id="warningArea"></div>

    <div class="status" id="statusArea">
      페이지를 분석하려면 아래 버튼을 클릭하세요.
    </div>

    <button class="btn btn-primary" id="extractBtn">이미지 추출하기</button>
    <button class="btn btn-download" id="downloadBtn" style="display:none">전체 다운로드 (ZIP)</button>

    <div class="progress" id="progressArea"></div>

    <div class="image-list" id="imageList" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
