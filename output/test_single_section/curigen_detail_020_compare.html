<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 020 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; } .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f7f8f4; }
  .artboard { width: 860px; min-height: 4304px; margin: 0 auto; border-radius: 18px; background: #fff; padding: 40px 80px; }
  .topline { text-align: center; color: #72c44a; font-size: 16px; font-weight: 800; margin-bottom: 8px; }
  .title { text-align: center; font-size: 52px; line-height: 1.15; color: #8b42be; font-weight: 900; letter-spacing: -.05em; margin-bottom: 34px; }
  .cards { display: grid; gap: 28px; }
  .price-card { border: 2px solid #cfe8a6; border-radius: 24px; padding: 24px; text-align: center; background: linear-gradient(180deg,#ffffff,#fbfcf9); box-shadow: 0 10px 24px rgba(0,0,0,.05); }
  .badge { display: inline-block; margin-bottom: 12px; padding: 7px 12px; border-radius: 999px; background: #a84fd1; color: #fff; font-size: 13px; font-weight: 800; }
  .name { font-size: 34px; font-weight: 900; color: #5a6069; line-height: 1.3; margin-bottom: 18px; }
  .oval { width: 320px; height: 180px; margin: 0 auto 20px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(191, 239, 141, .85), rgba(141, 72, 198, .9)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 30px; font-weight: 900; }
  .price { font-size: 48px; color: #78c83c; font-weight: 900; margin-bottom: 10px; }
  .sub { color: #8a95a0; font-size: 16px; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 020</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_020.jpg" alt="curigen detail 020 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 020</div>
    <div class="stage">
      <section class="artboard">
        <div class="topline" contenteditable="true">지금 구매 혜택</div>
        <div class="title" contenteditable="true">선착순 이벤트!</div>
        <div class="cards">
          <div class="price-card">
            <div class="badge">BEST</div>
            <div class="name" contenteditable="true">큐리젠 솔루션 3개</div>
            <div class="oval">3 bottle set</div>
            <div class="price" contenteditable="true">82,000원</div>
            <div class="sub" contenteditable="true">꾸준한 집중 관리용 구성</div>
          </div>
          <div class="price-card">
            <div class="badge">MAX</div>
            <div class="name" contenteditable="true">큐리젠 솔루션 4개</div>
            <div class="oval">4 bottle set</div>
            <div class="price" contenteditable="true">98,000원</div>
            <div class="sub" contenteditable="true">가장 긴 사용 루틴용 구성</div>
          </div>
          <div class="price-card">
            <div class="badge">RECOMMEND</div>
            <div class="name" contenteditable="true">큐리젠 솔루션 2개</div>
            <div class="oval">2 bottle set</div>
            <div class="price" contenteditable="true">60,000원</div>
            <div class="sub" contenteditable="true">2달분 관리에 적합한 구성</div>
          </div>
          <div class="price-card">
            <div class="badge">TRY</div>
            <div class="name" contenteditable="true">큐리젠 솔루션 1개</div>
            <div class="oval">1 bottle set</div>
            <div class="price" contenteditable="true">32,000원</div>
            <div class="sub" contenteditable="true">첫 구매 입문용 구성</div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
