<!DOCTYPE html>

<title>Curigen Detail 012 Compare</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }

  .stage { padding: 34px; background: #f3f6ee; }
  .artboard {
    width: 860px; min-height: 1234px; margin: 0 auto; border-radius: 18px; overflow: hidden;
    background: radial-gradient(circle at 50% 24%, rgba(195, 234, 130, .28), transparent 32%), #f7f8ef;
    padding: 56px 70px;
  }
  .doc-card {
    position: relative; margin: 0 auto; width: 620px; min-height: 1080px; background: #fff;
    box-shadow: 0 24px 50px rgba(40,44,49,.15); padding: 36px 36px 120px;
  }
  .seal-top { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #8ca0a6; margin-bottom: 10px; }
  .doc-meta { text-align: right; color: #8d97a0; font-size: 11px; margin-top: -70px; }
  .doc-grid { margin-top: 92px; color: #555d66; font-size: 28px; line-height: 1.85; }
  .doc-grid .check { color: #34b16b; font-weight: 900; }
  .doc-title { margin-top: 28px; font-size: 44px; font-weight: 900; color: #3f454d; letter-spacing: -.05em; }
  .stamp { position: absolute; right: 42px; bottom: 232px; width: 92px; height: 92px; border: 4px solid #ca5358; opacity: .62; }
  .cert-badge {
    position: absolute; right: -46px; bottom: 82px; width: 156px; height: 156px; border-radius: 50%;
    background: #fff; box-shadow: 0 10px 24px rgba(0,0,0,.12); border: 1px solid rgba(0,0,0,.06);
    display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    font-size: 14px; color: #4d5660; line-height: 1.5;
  }
  .cert-badge .mark { width: 30px; height: 30px; border-radius: 50%; background: #30c26d; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>

</html>
