<head>

<style>

  .stage { padding: 34px; background: #f5f5f5; }
  .artboard { width: 860px; min-height: 748px; margin: 0 auto; border-radius: 18px; background: #fff; padding: 82px 72px; }
  .topline { color: #5b6067; font-size: 34px; letter-spacing: -.05em; margin-bottom: 22px; }
  .headline { font-size: 110px; line-height: .96; font-weight: 900; letter-spacing: -.08em; margin-bottom: 50px; background: linear-gradient(90deg,#9ed47d,#b276e6); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .copy { font-size: 29px; line-height: 1.85; color: #4b5058; letter-spacing: -.05em; }
  .copy .accent { color: #ab5fdd; font-weight: 900; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>

  </div>

    <div class="panel-head">HTML Recreation Curigen 018</div>
    <div class="stage">
      <section class="artboard">
        <div class="topline" contenteditable="true">큐리젠 토탈 솔루션</div>
        <div class="headline" contenteditable="true">100일의 기적</div>

        </div>

    </div>
  </div>
</div>
</body>
</html>
