<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }

  .pill { background: #fff; border-radius: 16px; padding: 26px 12px; text-align: center; box-shadow: 0 12px 24px rgba(0,0,0,.07); }
  .pill b { display: block; font-size: 24px; color: #2f353b; margin-bottom: 8px; }
  .pill span { font-size: 20px; color: #70767f; }
  .desc { text-align: center; font-size: 31px; line-height: 1.6; color: #4b5057; letter-spacing: -.05em; margin-bottom: 58px; }
  .bottom { display: flex; align-items: end; justify-content: space-between; }
  .flask { width: 190px; height: 300px; position: relative; }
  .flask::before { content: ""; position: absolute; left: 74px; top: 0; width: 42px; height: 88px; border: 4px solid rgba(255,255,255,.85); border-bottom: 0; border-radius: 20px 20px 0 0; }
  .flask::after { content: ""; position: absolute; left: 14px; top: 72px; width: 160px; height: 210px; border: 4px solid rgba(255,255,255,.85); border-top: 0; border-radius: 0 0 34px 34px; background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.28)); }
  .products { display: flex; gap: 34px; align-items: end; }
  .product { width: 150px; position: relative; }
  .dropper { width: 48px; height: 84px; margin: 0 auto; border-radius: 24px 24px 12px 12px; background: linear-gradient(180deg, #ffffff, #efefef); }
  .cap { width: 74px; height: 56px; margin: -8px auto 0; border-radius: 8px; background: linear-gradient(90deg, #767676, #f7f7f7 36%, #989898 64%, #f0f0f0); }
  .bottle { width: 150px; height: 184px; margin-top: -4px; border-radius: 22px 22px 34px 34px; background: linear-gradient(180deg, #ffffff, #f4f6f8); border: 2px solid rgba(188, 193, 197, .65); position: relative; }
  .brand { position: absolute; left: 14px; top: 56px; color: #7c42a5; font-size: 28px; line-height: .92; font-weight: 900; letter-spacing: -.06em; }
  .green { position: absolute; left: 12px; right: 12px; bottom: 28px; background: #97cf2c; color: #fff; padding: 7px 10px; font-size: 16px; font-weight: 900; text-align: center; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
