<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 010 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; } .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f2f2f2; }
  .artboard { width: 860px; min-height: 580px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 18px; background: #3d3d3d; }
  .artboard::before, .artboard::after {
    content: '';
    position: absolute;
    left: -60px;
    right: -60px;
    height: 54px;
    background: rgba(185, 62, 62, .42);
    transform-origin: center;
  }
  .artboard::before { top: 72px; transform: rotate(35deg); }
  .artboard::after { bottom: 72px; transform: rotate(-35deg); }
  .glove {
    position: absolute;
    left: 70px;
    top: 100px;
    width: 330px;
    height: 320px;
    background: linear-gradient(135deg, #080808, #2a2a2a);
    border-radius: 180px 120px 120px 100px;
    transform: rotate(-18deg);
    box-shadow: 0 18px 30px rgba(0,0,0,.3);
  }
  .vial {
    position: absolute;
    left: 286px;
    top: 106px;
    width: 138px;
    height: 250px;
    background: linear-gradient(180deg, #ececec, #b3b3b3);
    border-radius: 18px;
    transform: rotate(2deg);
    opacity: .68;
  }
  .headline {
    position: absolute;
    left: 0;
    right: 0;
    top: 150px;
    text-align: center;
    color: #fff;
    font-size: 86px;
    line-height: 1.04;
    font-weight: 900;
    letter-spacing: -.08em;
  }
  .subcopy {
    position: absolute;
    left: 70px;
    right: 70px;
    bottom: 90px;
    text-align: center;
    color: rgba(255,255,255,.92);
    font-size: 32px;
    line-height: 1.7;
    letter-spacing: -.04em;
  }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 010</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_010.jpg" alt="curigen detail 010 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 010</div>
    <div class="stage">
      <section class="artboard">
        <div class="glove"></div>
        <div class="vial"></div>
        <div class="headline" contenteditable="true">유사품주의</div>
        <div class="subcopy" contenteditable="true">일반 화장품에 들어가는 성분으로는<br>손, 발톱의 개선을 기대하기 어렵습니다.</div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
