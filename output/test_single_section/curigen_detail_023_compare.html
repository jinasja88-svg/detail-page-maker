<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 023 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; }
  .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #efefef; }
  .artboard { width: 860px; min-height: 980px; margin: 0 auto; border-radius: 18px; background: linear-gradient(180deg, #f4f4f4 0%, #ececec 100%); padding: 92px 64px; }
  .copy { text-align: center; color: #30343a; font-size: 34px; line-height: 1.4; font-weight: 700; letter-spacing: -.05em; }
  .headline { text-align: center; margin-top: 18px; font-size: 70px; line-height: 1.06; font-weight: 900; letter-spacing: -.07em; background: linear-gradient(90deg, #9ed879, #ae5fe3); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .docs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; margin-top: 72px; align-items: end; }
  .doc { background: #fff; border-radius: 14px; padding: 26px 20px; min-height: 360px; box-shadow: 0 18px 34px rgba(0,0,0,.10); position: relative; overflow: hidden; }
  .doc:nth-child(2) { transform: translateY(14px); }
  .doc:nth-child(3) { transform: translateY(6px); }
  .line { height: 10px; border-radius: 999px; background: #ebedf1; margin-bottom: 10px; }
  .line.sm { width: 48%; }
  .line.md { width: 76%; }
  .line.lg { width: 100%; }
  .grid { margin-top: 18px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .chip { height: 64px; border: 1px solid #d8dbe0; background: #f8f8f8; border-radius: 8px; }
  .stamp { position: absolute; left: 24px; bottom: 22px; width: 72px; height: 72px; border-radius: 50%; border: 3px solid rgba(179, 70, 98, .45); }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 023</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_023.jpg" alt="curigen detail 023 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 023</div>
    <div class="stage">
      <section class="artboard">
        <div class="copy" contenteditable="true">무좀균(백선균 ATCC62345)을 포함한</div>
        <div class="headline" contenteditable="true">5종 99.9% 살균 인증</div>
        <div class="docs">
          <div class="doc">
            <div class="line sm"></div>
            <div class="line md"></div>
            <div class="line lg"></div>
            <div class="grid">
              <div class="chip"></div>
              <div class="chip"></div>
            </div>
            <div class="line md" style="margin-top:18px;"></div>
            <div class="line lg"></div>
            <div class="stamp"></div>
          </div>
          <div class="doc">
            <div class="line sm"></div>
            <div class="line lg"></div>
            <div class="grid">
              <div class="chip"></div>
              <div class="chip"></div>
              <div class="chip"></div>
              <div class="chip"></div>
              <div class="chip"></div>
              <div class="chip"></div>
            </div>
          </div>
          <div class="doc">
            <div class="line sm"></div>
            <div class="line md"></div>
            <div class="line lg"></div>
            <div class="line md"></div>
            <div class="line lg"></div>
            <div class="line md"></div>
            <div class="line lg"></div>
            <div class="line md"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
