<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 019 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; } .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f4f6f2; }
  .artboard { width: 860px; min-height: 1244px; margin: 0 auto; border-radius: 18px; overflow: hidden; background: radial-gradient(circle at 48% 18%, rgba(195, 234, 130, .42), transparent 34%), linear-gradient(180deg,#e7f0c4,#ffffff 76%); position: relative; padding: 70px 64px; }
  .small { text-align: center; color: #72777f; font-size: 28px; margin-bottom: 18px; }
  .headline { text-align: center; font-size: 86px; line-height: 1.08; letter-spacing: -.08em; font-weight: 900; color: #9d3fd2; margin-bottom: 24px; }
  .headline .blk { color: #9d3fd2; } .headline .dark { color: #8d32c4; }
  .bar { width: 520px; margin: 0 auto 34px; background: #8c36b3; color: #fff; text-align: center; padding: 13px 16px; font-size: 34px; font-weight: 700; letter-spacing: -.04em; }
  .bottle-wrap { position: absolute; left: 0; right: 0; bottom: 96px; width: 300px; margin: 0 auto; }
  .shadow { width: 210px; height: 40px; margin: 0 auto 10px; background: radial-gradient(circle, rgba(0,0,0,.18), transparent 72%); }
  .dropper { width: 84px; height: 122px; margin: 0 auto; border-radius: 42px 42px 18px 18px; background: linear-gradient(180deg,#fff,#f3f3f3); }
  .cap { width: 124px; height: 86px; margin: -18px auto 0; background: linear-gradient(90deg,#6f6f70,#f4f4f5 34%,#9b9b9b 64%,#ececec); border-radius: 8px; }
  .bottle { width: 210px; height: 258px; margin: -4px auto 0; background: linear-gradient(180deg,#ffffff,#f2f4f6); border-radius: 24px 24px 46px 46px; border: 3px solid rgba(180,188,194,.5); position: relative; }
  .tag { position: absolute; left: 18px; top: 20px; width: 56px; padding: 5px 8px; border-radius: 999px; background: #7b3f9c; color: #fff; font-size: 11px; font-weight: 700; text-align: center; }
  .brand { position: absolute; left: 18px; top: 56px; font-size: 46px; line-height: .94; color: #7b3f9c; font-weight: 900; letter-spacing: -.08em; }
  .sub { position: absolute; left: 18px; top: 146px; font-size: 18px; color: #7b3f9c; font-weight: 700; }
  .green { position: absolute; left: 18px; right: 18px; bottom: 44px; background: #98cf2c; color: #fff; padding: 10px 12px; font-size: 24px; font-weight: 900; }
  .ml { position: absolute; left: 0; right: 0; bottom: 10px; text-align: center; color: #444; font-size: 20px; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 019</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_019.jpg" alt="curigen detail 019 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 019</div>
    <div class="stage">
      <section class="artboard">
        <div class="small" contenteditable="true">All in one</div>
        <div class="headline" contenteditable="true">매일 한 방울로<br>살균·보호·영양까지</div>
        <div class="bar" contenteditable="true">이제, 큐리젠으로 해결하세요!</div>
        <div class="bottle-wrap">
          <div class="shadow"></div>
          <div class="dropper"></div>
          <div class="cap"></div>
          <div class="bottle">
            <div class="tag">의약외품</div>
            <div class="brand">Curigen</div>
            <div class="sub">Total Solution</div>
            <div class="green">99.9%</div>
            <div class="ml">30 ml / 1.01 fl. oz.</div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
