<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 015 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; } .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f7f5f9; }
  .artboard { width: 860px; min-height: 2150px; margin: 0 auto; border-radius: 18px; background: #fafafa; padding: 50px 44px; }
  .topnote { text-align: center; color: #7f8792; font-size: 14px; margin-bottom: 10px; }
  .headline { text-align: center; line-height: 1.02; margin-bottom: 36px; }
  .headline .n1 { font-size: 98px; font-weight: 900; background: linear-gradient(90deg,#a5d47c,#b277e6); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .headline .n2 { display: block; font-size: 74px; font-weight: 300; color: #b278df; letter-spacing: -.05em; margin-top: 6px; }
  .proof-list { display: grid; gap: 26px; }
  .proof-card { background: #fff; border-radius: 26px; padding: 24px; box-shadow: 0 14px 28px rgba(0,0,0,.06); }
  .proof-head { display: grid; grid-template-columns: 1fr 150px; gap: 18px; align-items: start; margin-bottom: 14px; }
  .proof-title { font-size: 38px; line-height: 1.25; color: #8f5fd4; font-weight: 900; letter-spacing: -.05em; }
  .proof-title small { display: block; color: #9dd17d; font-size: 28px; font-weight: 700; }
  .proof-badge { background: #b26ddd; color: #fff; border-radius: 6px; text-align: center; padding: 22px 10px; font-size: 24px; line-height: 1.35; font-weight: 900; }
  .plates { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .plate { background: #111; border-radius: 4px; overflow: hidden; }
  .plate img { width: 100%; display: block; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 015</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_015.gif" alt="curigen detail 015 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 015</div>
    <div class="stage">
      <section class="artboard">
        <div class="topnote" contenteditable="true">곰팡이균(백선균 ATCC82345)을 포함한 “문제성 발톱 유해균 5종”</div>
        <div class="headline"><span class="n1" contenteditable="true">99.9%</span><span class="n2" contenteditable="true">살 균 인 증</span></div>
        <div class="proof-list">
          <div class="proof-card">
            <div class="proof-head">
              <div class="proof-title" contenteditable="true"><small>01</small>백선균<br>(진균 곰팡이균)</div>
              <div class="proof-badge" contenteditable="true">0.0%<br>살균 확인</div>
            </div>
            <div class="plates">
              <div class="plate"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_014.jpg" alt="proof plate before"></div>
              <div class="plate"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_015.gif" alt="proof plate after"></div>
            </div>
          </div>
          <div class="proof-card">
            <div class="proof-head">
              <div class="proof-title" contenteditable="true"><small>02</small>황색포도상구균</div>
              <div class="proof-badge" contenteditable="true">0.0%<br>살균 확인</div>
            </div>
            <div class="plates">
              <div class="plate"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_014.jpg" alt="proof plate before 2"></div>
              <div class="plate"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_015.gif" alt="proof plate after 2"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
