<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 009 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; } .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f3edf7; }
  .artboard { width: 860px; min-height: 728px; margin: 0 auto; padding: 44px; border-radius: 18px; background: #8d56ab; color: #fff; }
  .head { display: flex; align-items: center; gap: 14px; font-size: 44px; font-weight: 700; margin-bottom: 34px; letter-spacing: -.04em; }
  .icon { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,.8); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; }
  .rule-list { display: grid; gap: 30px; font-size: 28px; line-height: 1.75; letter-spacing: -.04em; }
  .rule-item { position: relative; padding-left: 22px; }
  .rule-item::before { content: '>'; position: absolute; left: 0; top: 0; color: rgba(255,255,255,.9); font-weight: 900; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 009</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_009.jpg" alt="curigen detail 009 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 009</div>
    <div class="stage">
      <section class="artboard">
        <div class="head"><div class="icon">i</div><div contenteditable="true">큐리젠 100% 환불규정</div></div>
        <div class="rule-list">
          <div class="rule-item" contenteditable="true">공식판매처 구매 시 환불 가능</div>
          <div class="rule-item" contenteditable="true">제품 구매일로부터 30일 이내 100% 반품 가능.<br>(왕복 택배비 고객 부담, 제품 회수 후 반품)</div>
          <div class="rule-item" contenteditable="true">1개 이상의 제품 구입 후 반품의 경우 추가 구매 제품 개봉 및 패키지 손상 시<br>1개 제품 + 미개봉 상품만 환불 가능</div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
