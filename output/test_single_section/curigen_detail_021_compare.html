<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen Detail 021 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; }
  .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f3f0f8; }
  .artboard {
    width: 860px; min-height: 1500px; margin: 0 auto; border-radius: 18px;
    background: radial-gradient(circle at 20% 12%, rgba(156, 223, 112, .30), transparent 24%),
                radial-gradient(circle at 80% 16%, rgba(188, 116, 230, .28), transparent 28%),
                linear-gradient(180deg, #d3d8c7 0%, #73428f 100%);
    padding: 72px 58px;
  }
  .eyebrow { color: rgba(255,255,255,.9); font-size: 28px; letter-spacing: -.04em; margin-bottom: 18px; }
  .headline { color: #fff; font-size: 78px; line-height: .98; font-weight: 900; letter-spacing: -.07em; margin-bottom: 46px; }
  .card { background: #fff; border-radius: 10px; padding: 38px 44px; box-shadow: 0 18px 40px rgba(0,0,0,.12); }
  .row { padding: 26px 0; border-bottom: 1px solid #ececec; }
  .row:last-child { border-bottom: 0; }
  .tag { display: inline-block; padding: 6px 10px; background: #b9dc9b; color: #fff; font-size: 18px; font-weight: 800; margin-bottom: 12px; }
  .title { font-size: 58px; line-height: 1.08; font-weight: 900; letter-spacing: -.06em; background: linear-gradient(90deg, #9ed477, #b05de2); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 14px; }
  .desc { color: #575b62; font-size: 26px; line-height: 1.65; letter-spacing: -.04em; }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen 021</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_b624375f/detail_images/detail_021.jpg" alt="curigen detail 021 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen 021</div>
    <div class="stage">
      <section class="artboard">
        <div class="eyebrow" contenteditable="true">큐리젠 토탈 솔루션만의 손발톱 건강</div>
        <div class="headline" contenteditable="true">3-step Solution!</div>
        <div class="card">
          <div class="row">
            <div class="tag">SOLUTION 01</div>
            <div class="title" contenteditable="true">강력한 99.9% 살균 효과</div>
            <div class="desc" contenteditable="true">문제성 손발톱을 유발하는 유해균 5종 99.9% 살균 인증 완료</div>
          </div>
          <div class="row">
            <div class="tag">SOLUTION 02</div>
            <div class="title" contenteditable="true">확실한 항균 보호막</div>
            <div class="desc" contenteditable="true">세균이 번식하거나 증식하지 못하도록 억제해 손발톱 환경을 안정적으로 관리합니다.</div>
          </div>
          <div class="row">
            <div class="tag">SOLUTION 03</div>
            <div class="title" contenteditable="true">손발톱 영양 집중 공급</div>
            <div class="desc" contenteditable="true">진정, 보습, 재생촉진을 한 번에 담아 약해진 부위를 촘촘하게 케어합니다.</div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
