<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curigen4 Detail 001 Compare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Noto Sans KR', sans-serif; padding: 24px; }
  .compare { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.18); }
  .panel-head { padding: 14px 18px; font-size: 14px; font-weight: 800; background: #1f1f1f; color: #fff; }
  .ref-wrap { padding: 14px; background: #f3f3f3; }
  .ref-wrap img { width: 100%; display: block; border-radius: 14px; }
  .stage { padding: 34px; background: #f4f1f8; }
  .artboard {
    width: 860px; min-height: 1560px; margin: 0 auto; border-radius: 18px; overflow: hidden;
    background:
      radial-gradient(circle at 16% 10%, rgba(169, 231, 122, .45), transparent 24%),
      linear-gradient(180deg, #c6c8bb 0%, #8753a6 100%);
    padding: 46px 54px 60px;
  }
  .eyebrow { text-align: center; color: #b356db; font-size: 30px; font-weight: 700; margin-bottom: 12px; }
  .headline { text-align: center; font-size: 76px; line-height: 1.02; letter-spacing: -.07em; font-weight: 900; color: #8b20b9; margin-bottom: 12px; }
  .sub { text-align: center; color: #3d4147; font-size: 26px; margin-bottom: 34px; }
  .grid { display: grid; gap: 24px; }
  .pair { display: grid; grid-template-columns: 1fr 56px 1fr; gap: 14px; align-items: center; }
  .shot { height: 176px; border: 2px solid rgba(72,72,72,.42); background: linear-gradient(180deg, #d7c3b0, #f2e9dc); border-radius: 2px; position: relative; overflow: hidden; }
  .shot.gray { background: linear-gradient(180deg, #746c69, #c7beb8); }
  .shot.toe { background: linear-gradient(180deg, #c59058, #f0d0b0); }
  .shot.heel { background: linear-gradient(180deg, #9f7a58, #d4b08f); }
  .toe-shape, .heel-shape {
    position: absolute; inset: 16px;
    border-radius: 18px;
    background: radial-gradient(circle at 30% 35%, rgba(255,255,255,.42), transparent 20%), linear-gradient(135deg, rgba(255,255,255,.16), rgba(0,0,0,.08));
  }
  .arrow {
    width: 56px; height: 56px; border-radius: 50%;
    background: #ffd957; color: #6c5a1c; display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900; box-shadow: 0 8px 18px rgba(0,0,0,.12);
  }
  [contenteditable]:hover { outline: 2px dashed #4fc3f7; outline-offset: 3px; }
  [contenteditable]:focus { outline: 2px solid #4fc3f7; outline-offset: 3px; }
</style>
</head>
<body>
<div class="compare">
  <div class="panel">
    <div class="panel-head">Original Reference Curigen4 001</div>
    <div class="ref-wrap"><img src="../curigen_cafe24_com_8a53d007/detail_images/detail_001.jpg" alt="curigen4 detail 001 original"></div>
  </div>
  <div class="panel">
    <div class="panel-head">HTML Recreation Curigen4 001</div>
    <div class="stage">
      <section class="artboard">
        <div class="eyebrow" contenteditable="true">Before &amp; After</div>
        <div class="headline" contenteditable="true">#한달효과 #리얼리뷰</div>
        <div class="sub" contenteditable="true">큐리젠 한눈에 보는 효과</div>
        <div class="grid">
          <div class="pair">
            <div class="shot"><div class="toe-shape"></div></div>
            <div class="arrow">&gt;</div>
            <div class="shot gray"><div class="toe-shape"></div></div>
          </div>
          <div class="pair">
            <div class="shot toe"><div class="toe-shape"></div></div>
            <div class="arrow">&gt;</div>
            <div class="shot"><div class="toe-shape"></div></div>
          </div>
          <div class="pair">
            <div class="shot heel"><div class="heel-shape"></div></div>
            <div class="arrow">&gt;</div>
            <div class="shot"><div class="heel-shape"></div></div>
          </div>
          <div class="pair">
            <div class="shot heel"><div class="heel-shape"></div></div>
            <div class="arrow">&gt;</div>
            <div class="shot"><div class="heel-shape"></div></div>
          </div>
          <div class="pair">
            <div class="shot heel"><div class="heel-shape"></div></div>
            <div class="arrow">&gt;</div>
            <div class="shot"><div class="heel-shape"></div></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
</body>
</html>
